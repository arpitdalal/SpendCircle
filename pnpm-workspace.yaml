packages:
  - "apps/*"
  - "packages/*"

overrides:
  # better-auth@1.6.x bundles @better-fetch/fetch@1.2.2; better-call@1.3.x still uses 1.1.21.
  # @convex-dev/better-auth crossDomainClient() types against whichever copy resolves → TS2322
  # vs createAuthClient() unless the workspace resolves a single fetch version (1.1.21 matches better-call).
  "@better-fetch/fetch": 1.1.21
  kysely: 0.28.17

allowBuilds:
  '@biomejs/biome': true
  core-js: true
  esbuild: true
  lefthook: true
  msw: true

# cnfast@0.0.8 was published 2026-06-22; remove this block on 2026-06-23 once it clears the 24h release-age policy. See #211.
minimumReleaseAgeExclude:
  - cnfast@0.0.8
