# https://lefthook.dev/configuration/

pre-commit:
  commands:
    format:
      # Biome does not handle root README / .env.example; `--staged` would pass
      # them and exit 1 ("No files were processed"). Scope to known extensions.
      glob: "**/*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,css,html}"
      run: pnpm exec biome check --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    lint:
      run: pnpm lint
    typecheck:
      run: pnpm typecheck
